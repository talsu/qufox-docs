name: Bug report
description: Report a problem with qufox-docs
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Ideally a minimal Markdown sample and the command you ran.
      placeholder: |
        1. Content: `...`
        2. Run: `qufox-docs serve ./notes`
        3. Open `/...`
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: qufox-docs version
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - WSL
        - Docker
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g. 22.12.0
    validations:
      required: true
